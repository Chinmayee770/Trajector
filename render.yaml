services:
  - type: web
    name: trajector
    env: python
    plan: free
    buildCommand: pip install -r requirements_deploy.txt
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    healthCheckPath: /api/health
    envVars:
      - key: ST_USER
        sync: false      # set manually in Render dashboard
      - key: ST_PASS
        sync: false      # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
